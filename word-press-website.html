<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


</head>
<body>
    <form name="contact-form" action="https://script.google.com/macros/s/AKfycbza1006MZ9W5hDO2ghlYsJijKu4Wv2lkuNlgbjHcNgffjWaPH1uD4vy4Zj2_A9Epnqqxw/exec" method="post">
        <input type="text" name="name" placeholder="name">
        <input type="text" name="number" placeholder="number">
        <input type="email" name="name" placeholder="email">
        <input type="submit" value="submit" id="submit">
    </form>

</body>


    <script>
        const scriptURL =
  "https://script.google.com/macros/s/AKfycbza1006MZ9W5hDO2ghlYsJijKu4Wv2lkuNlgbjHcNgffjWaPH1uD4vy4Zj2_A9Epnqqxw/exec";

const form = document.forms["contact-form"];

form.addEventListener("submit", (e) => {
  e.preventDefault();
  fetch(scriptURL, { method: "POST", body: new FormData(form) })
    .then((response) =>
      alert("Thank you! your form is submitted successfully.")
    )
    .then(() => {
      window.location.reload();
    })
    .catch((error) => console.error("Error!", error.message));
});

    </script>    
</html>
